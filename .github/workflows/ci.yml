name: Test Suite

on:
  push:
    branches: [main, nightly]
  pull_request:
    branches: [main, nightly]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --all-extras
      # Full ruff check (all rules enabled in pyproject.toml), not just pyflakes (F).
      - name: Lint with ruff (full check)
        run: uv run ruff check miniUnicorn
      - name: Format check with ruff
        run: uv run ruff format --check miniUnicorn

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Cover the three major desktop OSes. Linux is the cheapest, so it
        # carries the newest AND oldest supported Python (3.11 + 3.14);
        # macOS and Windows sanity-check 3.12/3.13 to catch platform bugs
        # without exploding the matrix cost.
        os: ${{ fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') }}
        python-version: ${{ fromJSON('["3.11","3.12","3.13","3.14"]') }}
        exclude:
          # Trim cost: only run 3.12/3.13 on macOS/Windows (3.11 + 3.14 covered by Linux).
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/
