<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A460"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#e94560" stroke-width="4" opacity="0.6"/>
  <!-- Tail -->
  <path d="M 340 340 Q 400 300 420 260 Q 435 230 420 210" fill="none" stroke="url(#bodyGrad)" stroke-width="16" stroke-linecap="round"/>
  <!-- Body - round and low (Munchkin signature!) -->
  <ellipse cx="256" cy="320" rx="110" ry="75" fill="url(#bodyGrad)"/>
  <!-- Belly patch -->
  <ellipse cx="256" cy="335" rx="65" ry="45" fill="#FFDEAD" opacity="0.7"/>
  <!-- Back left leg (short!) -->
  <rect x="190" y="370" width="28" height="30" rx="10" fill="#D2691E"/>
  <ellipse cx="204" cy="400" rx="18" ry="8" fill="#C4722A"/>
  <!-- Back right leg (short!) -->
  <rect x="294" y="370" width="28" height="30" rx="10" fill="#D2691E"/>
  <ellipse cx="308" cy="400" rx="18" ry="8" fill="#C4722A"/>
  <!-- Front left leg (short!) -->
  <rect x="205" y="365" width="26" height="35" rx="10" fill="url(#bodyGrad)"/>
  <ellipse cx="218" cy="400" rx="17" ry="8" fill="#E8A04C"/>
  <!-- Front right leg (short!) -->
  <rect x="281" y="365" width="26" height="35" rx="10" fill="url(#bodyGrad)"/>
  <ellipse cx="294" cy="400" rx="17" ry="8" fill="#E8A04C"/>
  <!-- Head -->
  <circle cx="256" cy="220" r="72" fill="url(#bodyGrad)"/>
  <!-- Left ear -->
  <polygon points="198,175 185,115 225,160" fill="#D2691E"/>
  <polygon points="202,172 192,128 220,162" fill="#FFB6C1"/>
  <!-- Right ear -->
  <polygon points="314,175 327,115 287,160" fill="#D2691E"/>
  <polygon points="310,172 320,128 292,162" fill="#FFB6C1"/>
  <!-- Face patch -->
  <ellipse cx="256" cy="235" rx="45" ry="38" fill="#FFDEAD" opacity="0.6"/>
  <!-- Left eye -->
  <ellipse cx="232" cy="215" rx="16" ry="18" fill="white"/>
  <ellipse cx="234" cy="216" rx="10" ry="12" fill="#2d3436"/>
  <ellipse cx="237" cy="212" rx="4" ry="5" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="280" cy="215" rx="16" ry="18" fill="white"/>
  <ellipse cx="282" cy="216" rx="10" ry="12" fill="#2d3436"/>
  <ellipse cx="285" cy="212" rx="4" ry="5" fill="white"/>
  <!-- Nose -->
  <polygon points="256,237 250,244 262,244" fill="#FFB6C1"/>
  <!-- Mouth -->
  <path d="M 250 244 Q 256 252 262 244" fill="none" stroke="#8B4513" stroke-width="1.5"/>
  <line x1="256" y1="244" x2="256" y2="250" stroke="#8B4513" stroke-width="1.5"/>
  <!-- Whiskers left -->
  <line x1="195" y1="235" x2="235" y2="240" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="192" y1="245" x2="233" y2="245" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="195" y1="255" x2="235" y2="250" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <!-- Whiskers right -->
  <line x1="317" y1="235" x2="277" y2="240" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="320" y1="245" x2="279" y2="245" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="317" y1="255" x2="277" y2="250" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <!-- Tabby stripes on head -->
  <path d="M 240 168 Q 256 180 272 168" fill="none" stroke="#C4722A" stroke-width="2.5" opacity="0.6"/>
  <path d="M 235 178 Q 256 192 277 178" fill="none" stroke="#C4722A" stroke-width="2" opacity="0.5"/>
  <!-- Tabby stripes on body -->
  <path d="M 200 290 Q 256 280 312 290" fill="none" stroke="#C4722A" stroke-width="2.5" opacity="0.4"/>
  <path d="M 195 310 Q 256 300 317 310" fill="none" stroke="#C4722A" stroke-width="2.5" opacity="0.4"/>
  <path d="M 198 330 Q 256 320 314 330" fill="none" stroke="#C4722A" stroke-width="2.5" opacity="0.4"/>
</svg>