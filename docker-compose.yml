x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.miniUnicorn:/home/miniUnicorn/.miniUnicorn
  cap_drop:
    - ALL
  cap_add:
    - SYS_ADMIN
  security_opt:
    - apparmor=unconfined
    - seccomp=unconfined

services:
  miniUnicorn-gateway:
    container_name: miniUnicorn-gateway
    <<: *common-config
    command: ["gateway"]
    restart: unless-stopped
    ports:
      - 8765:8765
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  miniUnicorn-api:
    container_name: miniUnicorn-api
    <<: *common-config
    command:
      ["serve", "--host", "0.0.0.0", "-w", "/home/miniUnicorn/.miniUnicorn/api-workspace"]
    restart: unless-stopped
    ports:
      - 127.0.0.1:8900:8900
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  miniUnicorn-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
